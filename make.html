<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Async/Await Project</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #output { border: 1px solid #ccc; padding: 15px; border-radius: 8px; background: #f9f9f9; max-width: 400px; }
        .loading { color: #007bff; font-style: italic; }
        .error { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

    <h2>User Profile Data</h2>
    <p>This data is fetched asynchronously using <strong>JSON</strong> and <strong>Async/Await</strong>.</p>
    
    <!-- This is where our result will appear -->
    <div id="output">
        <p class="loading">Click the button to fetch user data...</p>
    </div>

    <br>
    <button onclick="displayUserProfile()">Fetch User Info</button>

    <script>
        // 1. Asynchronous function to fetch JSON data
        async function fetchUserData() {
            // Using a public API to fetch a user JSON object
            const response = await fetch('https://jsonplaceholder.typicode.com');
            
            if (!response.ok) {
                throw new Error("Network response was not ok");
            }

            // Waiting for the response to be converted to JSON
            const userData = await response.json();
            return userData;
        }

        // 2. The dependent function that handles the result
        async function displayUserProfile() {
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = '<p class="loading">Fetching data...</p>';

            try {
                // Dependency: This 'awaits' the result of fetchUserData()
                const user = await fetchUserData();

                // Updating the HTML with the result
                outputDiv.innerHTML = `
                    <h3>${user.name}</h3>
                    <p><strong>Email:</strong> ${user.email}</p>
                    <p><strong>City:</strong> ${user.address.city}</p>
                    <p><strong>Company:</strong> ${user.company.name}</p>
                `;
            } catch (error) {
                // Handling errors (like no internet or bad URL)
                outputDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
            }
        }
    </script>

</body>
</html>
