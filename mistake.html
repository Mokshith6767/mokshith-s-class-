<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JS Error Handling Project</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        #error-display { color: red; font-weight: bold; margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>JavaScript Error Handling</h2>
    <p>Click the button to trigger a controlled error.</p>

    <!-- Button to trigger the error -->
    <button onclick="handleMyError()">Run Code</button>

    <!-- Where the error message will be displayed -->
    <div id="error-display"></div>

    <script>
        function handleMyError() {
            const display = document.getElementById("error-display");
            
            try {
                // 1. Creating an error: calling a function that is NOT defined
                nonExistentFunction();

            } catch (err) {
                // 2. Displaying the error message on the screen
                display.innerText = "Error Caught: " + err.message;
                
                // Also log it to the console for developers
                console.error("The full error object:", err);
            } finally {
                // This runs regardless of whether there was an error
                console.log("Error handling attempt finished.");
            }
        }
    </script>

</body>
</html>
